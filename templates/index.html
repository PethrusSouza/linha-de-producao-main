{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Gestao</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <h2>Sistema de Gestao de Producao Grafica</h2>

            {% if messages %}
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                {% if form.non_field_errors %}
                    <div class="message error">{{ form.non_field_errors }}</div>
                {% endif %}
                <div class="form-group">
                    <label for="{{ form.usuario.id_for_label }}">Usuario</label>
                    {{ form.usuario }}
                </div>

                <div class="form-group">
                    <label for="{{ form.senha.id_for_label }}">Senha</label>
                    {{ form.senha }}
                </div>

                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
